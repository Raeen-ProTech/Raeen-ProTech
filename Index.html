<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raeen ProTech | Premium Tech Store Mumbai</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:linear-gradient(135deg,#000428,#004e92);
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
z-index:999;
}

nav h2{
font-family:'Orbitron',sans-serif;
letter-spacing:2px;
color:#00f7ff;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}
nav a:hover{color:#00f7ff}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}
.hero h1{
font-size:55px;
font-family:'Orbitron',sans-serif;
background:linear-gradient(90deg,#00f7ff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.hero p{
margin-top:15px;
opacity:0.8;
max-width:600px;
}
.btn{
margin-top:25px;
padding:12px 35px;
background:#00f7ff;
border-radius:30px;
color:black;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}
.btn:hover{background:white}

/* SECTION */
section{padding:100px 8%;text-align:center}
.section-title{
font-size:35px;
margin-bottom:40px;
font-family:'Orbitron',sans-serif;
color:#00f7ff;
}

/* PRODUCT GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}
.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
backdrop-filter:blur(15px);
transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
background:rgba(0,247,255,0.15);
}
.card h3{color:#00f7ff;margin-bottom:10px}

/* ADMIN PANEL */
.admin{
margin-top:40px;
background:#111;
padding:25px;
border-radius:15px;
}
.admin input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}
.admin button{
padding:10px 20px;
background:#00f7ff;
border:none;
cursor:pointer;
}

/* FOOTER */
footer{
background:#000;
padding:30px;
text-align:center;
margin-top:50px;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 18px;
border-radius:50%;
font-size:20px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<nav>
<h2>Raeen ProTech</h2>
<div>
<a href="#products">Products</a>
<a href="#admin">Add Product</a>
<a href="https://wa.me/919137953966">WhatsApp</a>
</div>
</nav>

<div class="hero">
<h1>Future of Tech Store</h1>
<p>New & Used Devices | All Parts Available | Software Installation & Repair Services in Mumbai</p>
<a href="https://wa.me/919137953966" class="btn">Chat Now</a>
</div>

<section id="products">
<h2 class="section-title">Our Products</h2>
<div class="products" id="productList"></div>
</section>

<section id="admin">
<h2 class="section-title">Admin Panel (Add Product)</h2>
<div class="admin">
<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>
</section>

<footer>
© 2026 Raeen ProTech | Mumbai | WhatsApp: 9137953966
</footer>

<a href="https://wa.me/919137953966" class="whatsapp">💬</a>

<script>
function loadProducts(){
let products = JSON.parse(localStorage.getItem("products")) || [];
let list = document.getElementById("productList");
list.innerHTML="";
products.forEach(p=>{
list.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>₹ ${p.price}</p>
<a href="https://wa.me/919137953966?text=I want to buy ${p.name}" class="btn">Buy Now</a>
</div>`;
});
}
function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
if(name && price){
let products=JSON.parse(localStorage.getItem("products")) || [];
products.push({name,price});
localStorage.setItem("products",JSON.stringify(products));
loadProducts();
}
}
loadProducts();
</script>

</body>
</html>
